name: Compilar Executavel Windows

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout do codigo
      uses: actions/checkout@v4 # Atualizado para v4

    - name: Instalar Python
      uses: actions/setup-python@v5 # Atualizado para v5
      with:
        python-version: '3.9'

    - name: Instalar Dependencias
      run: |
        pip install aiomysql customtkinter matplotlib pyinstaller

    - name: Gerar o EXE
      run: |
        pyinstaller --noconsole --onefile --collect-all customtkinter main.py

    - name: Disponibilizar para Download
      uses: actions/upload-artifact@v4 # AQUI ESTAVA O ERRO - Atualizado para v4
      with:
        name: Simulador-MySQL-Windows
        path: dist/main.exe
