name: Build MySQL Stress Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  # Resolve o aviso de depreciação forçando o uso do Node 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      # Versão v4 já deve suportar o Node 24 conforme atualizações do GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --noconsole --onefile --name "MySQL_Optimization_Comparator" main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MySQL-Comparator-EXE
          path: dist/MySQL_Optimization_Comparator.exe
