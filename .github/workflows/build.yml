name: Gerar Executavel Portatil

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Criar EXE
        run: |
          # O parâmetro --onefile coloca tudo (inclusive aiomysql) dentro de um único .exe
          pyinstaller --noconsole --onefile --name "Comparador_MySQL" main.py

      - name: Disponibilizar Arquivo
        uses: actions/upload-artifact@v4
        with:
          name: Simulador-MySQL
          path: dist/Comparador_MySQL.exe
